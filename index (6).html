<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Powertherm"/>
<meta name="theme-color" content="#D71920"/>
<title>Powertherm Industrial Services</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#D71920;min-height:100vh;min-height:100dvh;
    display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,'Segoe UI',Arial,sans-serif;padding:20px;
  }
  .card{background:#fff;border-radius:18px;padding:32px 26px;width:100%;max-width:380px;box-shadow:0 20px 50px rgba(0,0,0,.3);}
  .logo{text-align:center;margin-bottom:22px;}
  .bolt{font-size:44px;}
  .name{font-family:Arial,sans-serif;font-size:20px;font-weight:800;color:#D71920;letter-spacing:.08em;margin-top:4px;}
  .sub{font-size:11px;color:#9CA3AF;letter-spacing:.12em;margin-top:2px;}
  h2{font-size:20px;color:#111827;margin-bottom:4px;}
  p.hint{color:#9CA3AF;font-size:13px;margin-bottom:22px;}
  label{display:block;font-size:11px;font-weight:700;color:#4B5563;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
  input{
    width:100%;padding:13px 14px;border:1.5px solid #E5E7EB;border-radius:8px;
    font-size:16px;margin-bottom:16px;font-family:inherit;-webkit-appearance:none;
  }
  input:focus{outline:none;border-color:#D71920;}
  button{
    width:100%;padding:14px;background:#D71920;color:#fff;border:none;border-radius:8px;
    font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
  }
  button:disabled{opacity:.6;}
  .err{background:#FEF2F2;border:1px solid #FECACA;color:#D71920;padding:10px 13px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;}
  .foot{text-align:center;font-size:11px;color:#9CA3AF;margin-top:18px;}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="bolt">⚡</div>
      <div class="name">POWERTHERM</div>
      <div class="sub">INDUSTRIAL SERVICES</div>
    </div>
    <h2>Welcome Back</h2>
    <p class="hint">Sign in to your account</p>

    <div class="err" id="err"></div>

    <form id="lf" method="post" autocomplete="on">
      <label>Email / Username</label>
      <input type="email" id="email" name="email" autocomplete="username" required placeholder="you@powertherm.com" />
      <label>Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••" />
      <button type="submit" id="btn">Sign In →</button>
    </form>

    <div class="foot">Powertherm Attendance System</div>
  </div>

<script>
  // ── PASTE YOUR APPS SCRIPT WEB APP URL BELOW ──
  var APP_URL = "https://script.google.com/macros/s/AKfycby03yM6XkfC8MOpQ1iUYut2EJTeNVDBB1NLV46RJOTRLVSsaDjcKZeVmjkAU9P5zq-W/exec";
  // ───────────────────────────────────────────────

  var form = document.getElementById('lf');
  var btn = document.getElementById('btn');
  var err = document.getElementById('err');

  form.addEventListener('submit', function(e){
    e.preventDefault();
    err.style.display='none';
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;

    var body = 'email=' + encodeURIComponent(email) + '&password=' + encodeURIComponent(password);

    fetch(APP_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/x-www-form-urlencoded'},
      body: body
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(!data.success){
        err.textContent = data.message || 'Invalid email or password.';
        err.style.display='block';
        btn.disabled = false;
        btn.textContent = 'Sign In →';
        return;
      }
      // Success! Browser will now offer to save the password (real top-level form submit).
      // Redirect into the app with the token so it logs in automatically.
      window.location.href = APP_URL + '?t=' + encodeURIComponent(data.token);
    })
    .catch(function(){
      err.textContent = 'Connection error. Please check your internet and try again.';
      err.style.display='block';
      btn.disabled = false;
      btn.textContent = 'Sign In →';
    });
  });
</script>
</body>
</html>
